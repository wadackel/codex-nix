name: Setup Nix
description: Install Nix with the Determinate Systems installer.

# Note on caching: an earlier revision of this action used
# nix-community/cache-nix-action, but its store-GC step intermittently
# evicted .drv files that subsequent `nix flake check` / `nix develop`
# invocations still needed, producing
# "error: store path '...isl-0.24.tar.bz2.drv' does not exist" failures
# on cold-restore runs. The flake is small enough that re-fetching from
# the public binary cache each run is cheaper than maintaining a custom
# store cache, so the cache layer was removed.

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        # v21 changed the default to `true`. Keep upstream Nix behavior.
        determinate: false
